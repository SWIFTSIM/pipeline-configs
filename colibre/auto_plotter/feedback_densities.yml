snii_thermal_feedback_density_halo_mass_max_all:
  type: "scatter"
  legend_loc: "upper left"
  x:
    quantity: "spherical_overdensity_200_crit.total_mass"
    units: Solar_Mass
    start: 1e8
    end: 1e13
  y:
    quantity: "bound_subhalo.last_supernova_event_maximum_gas_density"
    units: "mh/cm**3"
    start: 5e-2
    end: 5e6
  median:
    plot: true
    log: true
    adaptive: true
    number_of_bins: 25
    start:
      value: 1e8
      units: Solar_Mass
    end:
      value: 1e13
      units: Solar_Mass
  metadata:
    title: Maximal SNII thermal feedback Density-Halo Mass relation
    caption: Includes all haloes, including subhaloes.
    section: Feedback Densities

