stellar_mass_galaxy_size_50:
  type: "scatter"
  legend_loc: "upper left"
  x:
    quantity: "exclusive_sphere_50kpc.stellar_mass"
    units: Solar_Mass
    start: 1e6
    end: 1e12
  y:
    quantity: "exclusive_sphere_50kpc.half_mass_radius_stars"
    units: kpc
    start: 3e-1
    end: 3e1
  median:
    plot: true
    log: true
    adaptive: true
    number_of_bins: 30
    start:
      value: 1e6
      units: Solar_Mass
    end:
      value: 1e12
      units: Solar_Mass
  metadata:
    title: Stellar Mass-Galaxy Size relation (50 kpc aperture)
    caption: Uses a 50 kpc 3D aperture.
    section: Sizes
  observational_data:
    - filename: GalaxyStellarMassGalaxySize/Trujillo2020HalfMass.hdf5
    - filename: GalaxyStellarMassGalaxySize/Crain2015_REF25_z0p1.hdf5
    - filename: GalaxyStellarMassGalaxySize/Crain2015_REF25_z0p0.hdf5

