stellar_mass_sfr_active_50:
  type: scatter
  legend_loc: upper left
  selection_mask: exclusive_sphere_50kpc.is_active
  x:
    quantity: exclusive_sphere_50kpc.stellar_mass
    units: Solar_Mass
    start: 1e6
    end: 1e12
  y:
    quantity: exclusive_sphere_50kpc.star_formation_rate
    units: Solar_Mass / year
    start: 1e-3
    end: 1e3
  median:
    plot: true
    log: true
    adaptive: true
    number_of_bins: 30
    start:
      value: 1e6
      units: Solar_Mass
    end:
      value: 1e12
      units: Solar_Mass
  metadata:
    title: Stellar Mass-Star Formation Rate (50 kpc aperture) for active galaxies.
    caption: Only active galaxies are included. SFRs from Koprowski+ are based on
      UV+IV; active galaxies in Koprowski+ were identified based on UVJ colour selection.
    section: Star Formation Rates
  observational_data:
  - filename: GalaxyStellarMassStarFormationRate/Koprowski2024_SF.hdf5
stellar_mass_specific_sfr_all_50:
  type: scatter
