tully_fisher_50:
  type: scatter
  legend_loc: upper left
  x:
    quantity: exclusive_sphere_50kpc.stellar_mass
    units: solar_mass
    start: 1e6
    end: 1e12
  y:
    quantity: bound_subhalo.maximum_circular_velocity
    units: km/s
    start: 4
    end: 700
  median:
    plot: true
    log: true
    adaptive: true
    number_of_bins: 30
    start:
      value: 1e6
      units: solar_mass
    end:
      value: 1e12
      units: solar_mass
  metadata:
    title: Tully-Fisher (stellar mass, 50 kpc)
    caption: The Tully-Fisher relation based on stellar mass.
    section: Tully-Fisher
  observational_data:
  - filename: TullyFisherRelation/AvilaReese2008.hdf5
  - filename: TullyFisherRelation/Reyes2011.hdf5
